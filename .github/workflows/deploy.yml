name: Deploy portfolio site

# This workflow MUST live at the repository root (.github/workflows/), not
# inside portfolio-site/. GitHub only runs workflows from the root path.
#
# It builds the Astro site in portfolio-site/ and publishes the result to
# GitHub Pages. The site URL is read from the SITE_URL repo variable (set
# under Settings → Secrets and variables → Actions → Variables) or falls
# back to https://www.alexhuggler.com.

on:
  push:
    branches: [main]
    paths:
      - "portfolio-site/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portfolio-site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: portfolio-site/package-lock.json

      - run: npm ci
      - run: npm run build
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://www.alexhuggler.com' }}
          PUBLIC_CF_ANALYTICS_TOKEN: ${{ secrets.PUBLIC_CF_ANALYTICS_TOKEN }}
          PUBLIC_LIVE_DEMO_URL: ${{ vars.PUBLIC_LIVE_DEMO_URL }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: portfolio-site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
