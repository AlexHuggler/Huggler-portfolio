name: CI

on:
  push:
    branches: [main]
    paths:
      - "project-ai-sql-optimizer/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "project-ai-sql-optimizer/**"
      - ".github/workflows/ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: project-ai-sql-optimizer
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: make install
      - run: make lint
      - run: make test
      - run: make demo
