name: CI

on:
  push:
    branches: [main]
    paths:
      - "project-telecom-lakehouse/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "project-telecom-lakehouse/**"
      - ".github/workflows/ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: project-telecom-lakehouse
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: make install
      - run: make lint
      - run: make test
      - run: make demo

  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: project-telecom-lakehouse/terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
      - run: terraform init -backend=false
      - run: terraform validate
      - run: terraform fmt -check
